<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semester</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="titlebar" data-tauri-drag-region>
        <div class="traffic-space" data-tauri-drag-region></div>

        <div class="seg">
          <span class="seg-thumb" id="seg-thumb"></span>
          <button class="seg-btn" id="seg-month" data-act="view" data-view="month">Month</button>
          <button class="seg-btn" id="seg-week" data-act="view" data-view="week">Week</button>
          <button class="seg-btn" id="seg-agenda" data-act="view" data-view="agenda">Agenda</button>
        </div>

        <div class="monthnav" id="monthnav">
          <button class="nav-arrow" data-act="prev-month" title="Previous" aria-label="Previous">
            <svg class="icn" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 5 8 12l6.5 7"/></svg>
          </button>
          <button class="nav-today" data-act="go-today">Today</button>
          <button class="nav-arrow" data-act="next-month" title="Next" aria-label="Next">
            <svg class="icn" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.5 5 16 12l-6.5 7"/></svg>
          </button>
        </div>

        <div class="header-title" id="header-title"></div>

        <div class="tb-spacer" data-tauri-drag-region></div>

        <button class="icon-btn" id="btn-import" data-act="view" data-view="import" title="Import Syllabus" aria-label="Import syllabus">
          <svg class="icn" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3.5V14m0 0-4-4m4 4 4-4M4.5 15.5V18a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-2.5"/></svg>
        </button>
        <button class="icon-btn" id="btn-needs" data-act="view" data-view="needs" title="Needs a Date" aria-label="Needs a date">
          <svg class="icn" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3.5" y="5" width="17" height="15" rx="2.5"/><path d="M3.5 9.5h17M8.5 2.75V6M15.5 2.75V6M10.2 13.4a1.8 1.8 0 1 1 2.55 1.63c-.5.23-.75.57-.75 1.07v.2"/><path d="M12 18.6h.01"/></svg>
          <span class="badge" id="needs-badge" hidden></span>
        </button>
        <div class="vsep"></div>
        <button class="icon-btn" id="btn-theme" data-act="theme" title="Toggle appearance" aria-label="Toggle appearance"></button>
        <button class="btn-primary" data-act="open-add" title="New assignment (⌘N) · Quick add (⌘K)">
          <svg class="icn" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          New
        </button>
      </header>

      <div class="body">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main" id="main"></main>
      </div>
    </div>

    <div id="modal-root"></div>
  </body>
</html>
