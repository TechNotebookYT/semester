<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semester</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="titlebar" data-tauri-drag-region>
        <div class="traffic-space" data-tauri-drag-region></div>

        <div class="seg">
          <span class="seg-thumb" id="seg-thumb"></span>
          <button class="seg-btn" id="seg-month" data-act="view" data-view="month">Month</button>
          <button class="seg-btn" id="seg-week" data-act="view" data-view="week">Week</button>
          <button class="seg-btn" id="seg-agenda" data-act="view" data-view="agenda">Agenda</button>
        </div>

        <div class="monthnav" id="monthnav">
          <button class="nav-arrow" data-act="prev-month" title="Previous month">‹</button>
          <button class="nav-today" data-act="go-today">Today</button>
          <button class="nav-arrow" data-act="next-month" title="Next month">›</button>
        </div>

        <div class="header-title" id="header-title"></div>

        <div class="tb-spacer" data-tauri-drag-region></div>

        <button class="icon-btn" id="btn-import" data-act="view" data-view="import" title="Import Syllabus">⇩</button>
        <button class="icon-btn" id="btn-needs" data-act="view" data-view="needs" title="Needs a Date">◔<span class="badge" id="needs-badge" hidden></span></button>
        <div class="vsep"></div>
        <button class="icon-btn" id="btn-theme" data-act="theme" title="Toggle appearance">☾</button>
        <button class="btn-primary" data-act="open-add">＋ New</button>
      </header>

      <div class="body">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main" id="main"></main>
      </div>
    </div>

    <div id="modal-root"></div>
  </body>
</html>
